<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | NEXUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.5s ease;
        }
        
        .auth-card h1 {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
        }
        
        .auth-card input {
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            border-radius: 16px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .auth-card input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        
        .auth-card button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .auth-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.3);
        }
        
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f3f4f6;
            border-radius: 60px;
            padding: 4px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 600;
        }
        
        .auth-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }
        
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }
        
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <h1>✨ NEXUS ✨</h1>
    <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
        <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
    </div>
    
    <!-- Login Form -->
    <div id="loginForm" class="auth-form active">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
        <button id="loginBtn">🚀 تسجيل الدخول</button>
        <div id="loginMsg" class="error-msg"></div>
    </div>
    
    <!-- Register Form -->
    <div id="registerForm" class="auth-form">
        <input type="text" id="regName" placeholder="اسم المستخدم" autocomplete="name">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="regPass" placeholder="كلمة المرور" autocomplete="new-password">
        <input type="password" id="regConfirmPass" placeholder="تأكيد كلمة المرور" autocomplete="off">
        <button id="registerBtn">✨ إنشاء حساب</button>
        <div id="regMsg" class="error-msg"></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    // ==================== NEXUS Auth Page ====================
    
    function switchAuth(type) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        if (type === 'login') document.querySelectorAll('.auth-tab')[0].classList.add('active');
        else document.querySelectorAll('.auth-tab')[1].classList.add('active');
        
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.getElementById(type + 'Form').classList.add('active');
        
        clearErrors();
    }
    
    function clearErrors() {
        document.getElementById('loginMsg').innerHTML = '';
        document.getElementById('regMsg').innerHTML = '';
    }
    
    function showError(elementId, message) {
        const errorDiv = document.getElementById(elementId);
        errorDiv.innerHTML = message;
        setTimeout(() => {
            if (errorDiv) errorDiv.innerHTML = '';
        }, 5000);
    }
    
    function setLoading(btnId, isLoading, originalText) {
        const btn = document.getElementById(btnId);
        if (isLoading) {
            btn.innerHTML = '<span class="loading"></span> جاري...';
            btn.classList.add('btn-loading');
            btn.disabled = true;
        } else {
            btn.innerHTML = originalText;
            btn.classList.remove('btn-loading');
            btn.disabled = false;
        }
    }
    
    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showError('loginMsg', '⚠️ الرجاء إدخال البريد الإلكتروني وكلمة المرور');
            return;
        }
        
        setLoading('loginBtn', true, '🚀 تسجيل الدخول');
        
        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            const snapshot = await db.ref(`users/${user.uid}`).once('value');
            if (!snapshot.exists()) {
                await db.ref(`users/${user.uid}`).set({
                    name: user.displayName || email.split('@')[0],
                    email: email,
                    bio: "مرحباً! أنا في NEXUS ✨",
                    avatar: "",
                    cover: "",
                    website: "",
                    verified: false,
                    isAdmin: email === ADMIN_EMAIL,
                    blockedUsers: {},
                    mutedUntil: 0,
                    createdAt: Date.now()
                });
            }
            
            setLoading('loginBtn', false, '🚀 تسجيل الدخول');
            window.location.href = 'index.html';
            
        } catch (error) {
            setLoading('loginBtn', false, '🚀 تسجيل الدخول');
            let msg = '';
            switch (error.code) {
                case 'auth/user-not-found': msg = '❌ لا يوجد حساب بهذا البريد'; break;
                case 'auth/wrong-password': msg = '❌ كلمة المرور غير صحيحة'; break;
                case 'auth/invalid-email': msg = '❌ البريد الإلكتروني غير صالح'; break;
                case 'auth/too-many-requests': msg = '❌ تم تعطيل الحساب مؤقتاً'; break;
                default: msg = '❌ ' + error.message;
            }
            showError('loginMsg', msg);
        }
    });
    
    // Register
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value;
        const confirmPass = document.getElementById('regConfirmPass').value;
        
        if (!name || !email || !password) {
            showError('regMsg', '⚠️ الرجاء ملء جميع الحقول');
            return;
        }
        
        if (password !== confirmPass) {
            showError('regMsg', '⚠️ كلمة المرور غير متطابقة');
            return;
        }
        
        if (password.length < 6) {
            showError('regMsg', '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
            return;
        }
        
        setLoading('registerBtn', true, '✨ إنشاء حساب');
        
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await userCredential.user.updateProfile({ displayName: name });
            
            await db.ref(`users/${userCredential.user.uid}`).set({
                name: name,
                email: email,
                bio: "مرحباً! أنا في NEXUS ✨",
                avatar: "",
                cover: "",
                website: "",
                verified: false,
                isAdmin: email === ADMIN_EMAIL,
                blockedUsers: {},
                mutedUntil: 0,
                createdAt: Date.now()
            });
            
            setLoading('registerBtn', false, '✨ إنشاء حساب');
            window.location.href = 'index.html';
            
        } catch (error) {
            setLoading('registerBtn', false, '✨ إنشاء حساب');
            let msg = '';
            switch (error.code) {
                case 'auth/email-already-in-use': msg = '❌ البريد الإلكتروني مستخدم بالفعل'; break;
                case 'auth/invalid-email': msg = '❌ البريد الإلكتروني غير صالح'; break;
                case 'auth/weak-password': msg = '❌ كلمة المرور ضعيفة جداً'; break;
                default: msg = '❌ ' + error.message;
            }
            showError('regMsg', msg);
        }
    });
    
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.href = 'index.html';
        }
    });
</script>

</body>
</html>
